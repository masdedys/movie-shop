    <script>
    // 1. Ambil parameter 'id' dari URL halaman ini
    const urlParams = new URLSearchParams(window.location.search);
    const idDicari = urlParams.get('id');

    if (idDicari) {
        // 2. Fetch seluruh file file JSON lokal Anda
        fetch('../assets/js/movieList.json') 
            .then(response => response.json())
            .then(data => {
                // 3. CARI DATA YANG COCOK: Mencari objek yang id-nya sama dengan idDicari
                const dataDitemukan = data.movieList.find(item => item.id === idDicari);

                if (dataDitemukan) {
                    // 4. Masukkan data yang cocok ke dalam elemen HTML
                    // document.getElementById('detail-id').innerText = dataDitemukan.id;
                    document.getElementById('title').innerText = dataDitemukan.title;
                    document.getElementById('genre').innerText = dataDitemukan.genre;
                    document.getElementById('studio').innerText = dataDitemukan.studio;
                    document.getElementById('from').innerText = dataDitemukan.from;
                    document.getElementById('year').innerText = dataDitemukan.year;
                    document.getElementById('price').innerText = `${dataDitemukan.price}`;
                    document.getElementById('note').innerText = dataDitemukan.note;
                    
                    document.getElementById('note').innerText = dataDitemukan.note;
                     // Mengubah atribut 'src' gambar modal secara dinamis
                      document.getElementById("img").src = `../assets/film/${dataDitemukan.img}`;
                    // Sembunyikan tulisan loading, tampilkan tabel detail
                    //document.getElementById('loading').classList.add('d-none');
                    //document.getElementById('konten-detail').classList.remove('d-none');
                } else {
                    document.getElementById('title').innerText = "Data dengan ID tersebut tidak ditemukan.";
                    document.getElementById('content-body').classList.add('d-none');
                }
            })
            .catch(error => {
                document.getElementById('title').innerText = "Gagal memuat file JSON.";
                document.getElementById('content-body').classList.add('d-none');
                console.error('Error:', error);
            });
    } else {
        document.getElementById('title').innerText = "ID data tidak ditemukan di URL.";
        document.getElementById('content-body').classList.add('d-none');
    }
</script>
