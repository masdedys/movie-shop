    <script>
		$(document).ready(function() {
      $('#content').load('syaratKetentuan.html');
      // Menangani klik pada menu navigasi
      $(".list-group-item").click(function(e){
        e.preventDefault(); // Mencegah browser berpindah halaman
        // --- FITUR CLASS ACTIVE ---
        // 1. Hapus class 'active' dari SEMUA menu navigasi
        $('.list-group-item').removeClass('active');
        
        // 2. Tambahkan class 'active' HANYA ke menu yang baru saja diklik
        $(this).addClass('active');
        var halamanTujuan = $(this).attr("href"); // Ambil nilai atribut href
        // Tampilkan efek fadeout, load konten baru, lalu fadein
        $("#content").fadeOut(200, function() {
          $(this).load(halamanTujuan).fadeIn(200);
        });
      });

		})
	</script>
